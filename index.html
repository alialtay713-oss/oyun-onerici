<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎮 Oyun Önerici</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background: #0f0f1a;
            color: #eee;
        }
        .container {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }
        h1 {
            margin-bottom: 20px;
            font-size: 28px;
        }
        button {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 6px 4px;
            transition: 0.2s;
        }
        button:hover {
            background: #5a4bd1;
            transform: scale(1.02);
        }
        .filtre-btn {
            background: #2d2d4a;
            padding: 8px 18px;
            font-size: 14px;
        }
        .filtre-btn:hover {
            background: #3d3d5c;
        }
        .oyun-karti {
            background: #252541;
            padding: 20px;
            border-radius: 12px;
            margin: 16px 0;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .oyun-resim {
            width: 200px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            background: #2d2d4a;
        }
        .oyun-bilgi {
            flex: 1;
            min-width: 200px;
        }
        .oyun-bilgi h3 {
            margin: 0;
            color: #fff;
            font-size: 20px;
        }
        .oyun-bilgi p {
            margin: 6px 0;
            color: #aaa;
            font-size: 14px;
        }
        .detay-etiketi {
            background: #2d2d4a;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #c7c7e6;
            display: inline-block;
            margin: 3px 4px 3px 0;
        }
        .tur-etiketi {
            background: #6c5ce7;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: white;
            display: inline-block;
            margin-top: 6px;
        }
        .oynadim-btn {
            background: #00b894;
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        .oynadim-btn:hover {
            background: #00a381;
        }
        #sonuc {
            min-height: 100px;
            margin-top: 20px;
        }
        #oynananlar {
            margin-top: 30px;
            border-top: 1px solid #2d2d4a;
            padding-top: 20px;
        }
        #oynananlar h3 {
            margin-bottom: 12px;
        }
        #oynananListesi span {
            background: #2d2d4a;
            padding: 4px 16px;
            border-radius: 16px;
            margin: 4px;
            display: inline-block;
            font-size: 14px;
        }
        .filtreler {
            margin: 16px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
        }
        .filtreler span {
            margin-right: 8px;
            font-weight: bold;
        }
        .hata-mesaji {
            color: #ff6b6b;
        }
        .basari-mesaji {
            color: #00b894;
        }
        .yukleniyor {
            color: #fdcb6e;
        }
        .oyun-detaylari {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 Oyun Önerici</h1>

        <div>
            <button id="rastgeleBtn">🎲 Bana Oyun Öner</button>
            <button id="yenileBtn" style="background:#2d2d4a;">🔄 Oyunları Yenile</button>
        </div>

        <div class="filtreler">
            <span>Tür:</span>
            <button class="filtre-btn" data-tur="Tüm Türler">Tümü</button>
            <button class="filtre-btn" data-tur="action">Aksiyon</button>
            <button class="filtre-btn" data-tur="adventure">Macera</button>
            <button class="filtre-btn" data-tur="rpg">RPG</button>
            <button class="filtre-btn" data-tur="strategy">Strateji</button>
            <button class="filtre-btn" data-tur="simulation">Simülasyon</button>
            <button class="filtre-btn" data-tur="platformer">Platform</button>
            <button class="filtre-btn" data-tur="puzzle">Bulmaca</button>
            <button class="filtre-btn" data-tur="shooter">Nişancı</button>
        </div>

        <div id="sonuc">
            <p>Henüz öneri yok. Butona tıkla!</p>
        </div>

        <div id="oynananlar">
            <h3>✅ Oynadıklarım</h3>
            <div id="oynananListesi"><span style="color:#888;">Henüz oyun oynamadın.</span></div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1️⃣ SUPABASE BAĞLANTISI
        // ============================================================
        const SUPABASE_URL = "https://erlkkobrxrmdmcihzqjz.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_s4YSwBYzhJAU1GISeeqozQ_ZqZ5yWo4";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // 2️⃣ RAWG API ANAHTARI (BURAYA KENDİ ANAHTARINI YAZ!)
        // ============================================================
        const RAWG_API_KEY = "a432df797ae84cafab5abae0c270d5c4"; // <--- BURAYI DEĞİŞTİR!

        // ============================================================
        // 3️⃣ KULLANICI ID
        // ============================================================
        let kullaniciId = localStorage.getItem('kullaniciId');
        if (!kullaniciId) {
            kullaniciId = 'user_' + Math.random().toString(36).slice(2, 10);
            localStorage.setItem('kullaniciId', kullaniciId);
        }

        // ============================================================
        // 4️⃣ OYUNLARI API'DEN ÇEK
        // ============================================================
        async function oyunlariGetir() {
            const url =
                `https://api.rawg.io/api/games?key=${RAWG_API_KEY}&ordering=-rating&page_size=50&exclude_additions=true`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (!data.results) {
                    console.error('API\'den veri gelmedi:', data);
                    return [];
                }

                return data.results.map(game => ({
                    id: game.id,
                    isim: game.name,
                    tur: game.genres?.map(g => g.name).join(', ') || 'Bilinmiyor',
                    tur_slug: game.genres?.map(g => g.slug).join(', ') || '',
                    aciklama: game.description_raw || 'Açıklama yok',
                    resim_url: game.background_image || '',
                    cikis_yili: game.released ? game.released.split('-')[0] : 'Bilinmiyor',
                    gelistirici: game.developers?.map(d => d.name).join(', ') || 'Bilinmiyor',
                    puan: game.rating ? game.rating.toFixed(1) : '?',
                    metacritic: game.metacritic || '?',
                    platformlar: game.platforms?.map(p => p.platform.name).slice(0, 3).join(', ') || 'Bilinmiyor',
                    web_sitesi: game.website || ''
                }));

            } catch (error) {
                console.error('API çağrısı başarısız:', error);
                return [];
            }
        }

        // ============================================================
        // 5️⃣ VERİTABANI FONKSİYONLARI
        // ============================================================
        async function oynananlariGetir() {
            const { data, error } = await supabase
                .from('oynananlar')
                .select('oyun_id')
                .eq('kullanici_id', kullaniciId);
            if (error) {
                console.error('Oynananlar hatası:', error);
                return [];
            }
            return data.map(item => item.oyun_id);
        }

        // ============================================================
        // 6️⃣ ANA FONKSİYONLAR
        // ============================================================
        let tumOyunlar = [];

        async function oyunlariYenile() {
            const sonucDiv = document.getElementById('sonuc');
            sonucDiv.innerHTML = '<p class="yukleniyor">🔄 API\'den oyunlar yükleniyor...</p>';

            tumOyunlar = await oyunlariGetir();

            if (tumOyunlar.length === 0) {
                sonucDiv.innerHTML = '<p class="hata-mesaji">❌ API\'den oyun gelmedi! Anahtarını kontrol et.</p>';
                return;
            }

            // Veritabanına kaydet (isteğe bağlı, şimdilik sadece göster)
            sonucDiv.innerHTML = `<p class="basari-mesaji">✅ ${tumOyunlar.length} oyun yüklendi! Şimdi öneri alabilirsin.</p>`;
            console.log('📦 Yüklenen oyunlar:', tumOyunlar);
        }

        async function rastgeleOner() {
            const sonucDiv = document.getElementById('sonuc');

            if (tumOyunlar.length === 0) {
                await oyunlariYenile();
                if (tumOyunlar.length === 0) return;
            }

            sonucDiv.innerHTML = '<p class="yukleniyor">🔄 Oyun aranıyor...</p>';

            const oynananlar = await oynananlariGetir();
            const filtrelenmis = tumOyunlar.filter(o => !oynananlar.includes(o.id));

            if (filtrelenmis.length === 0) {
                sonucDiv.innerHTML = '<p class="basari-mesaji">🎉 Tüm oyunları oynadın! Yeni oyunlar yükle.</p>';
                return;
            }

            const rastgele = filtrelenmis[Math.floor(Math.random() * filtrelenmis.length)];
            oyunGoster(rastgele);
        }

        function oyunGoster(oyun) {
            const resimHtml = oyun.resim_url ?
                `<img src="${oyun.resim_url}" alt="${oyun.isim}" class="oyun-resim" />` :
                `<div class="oyun-resim" style="display:flex;align-items:center;justify-content:center;color:#888;">📷 Yok</div>`;

            document.getElementById('sonuc').innerHTML = `
                    <div class="oyun-karti">
                        ${resimHtml}
                        <div class="oyun-bilgi">
                            <h3>${oyun.isim}</h3>
                            <div class="oyun-detaylari">
                                <span class="detay-etiketi">📅 ${oyun.cikis_yili}</span>
                                <span class="detay-etiketi">⭐ ${oyun.puan}</span>
                                <span class="detay-etiketi">🎯 Metacritic: ${oyun.metacritic}</span>
                                <span class="detay-etiketi">🛠️ ${oyun.gelistirici}</span>
                                <span class="detay-etiketi">📱 ${oyun.platformlar}</span>
                            </div>
                            <p>${oyun.aciklama ? oyun.aciklama.substring(0, 250) + '...' : 'Açıklama yok'}</p>
                            <span class="tur-etiketi">🎮 ${oyun.tur}</span>
                            <div>
                                <button class="oynadim-btn" onclick="oynadimEkle(${oyun.id})">✅ Oynadım</button>
                                ${oyun.web_sitesi ? `<a href="${oyun.web_sitesi}" target="_blank" style="color:#6c5ce7;margin-left:12px;font-size:14px;">🔗 Web Sitesi</a>` : ''}
                            </div>
                        </div>
                    </div>
                `;
        }

        async function oynadimEkle(oyunId) {
            const { error } = await supabase
                .from('oynananlar')
                .insert({ kullanici_id: kullaniciId, oyun_id: oyunId });

            if (error) {
                alert('❌ Hata: ' + error.message);
                return;
            }

            document.getElementById('sonuc').innerHTML = '<p class="basari-mesaji">✅ Oyun listene eklendi! 🎲</p>';
            oynananListesiniGuncelle();
        }

        async function oynananListesiniGuncelle() {
            const oynananlar = await oynananlariGetir();
            const isimler = tumOyunlar
                .filter(o => oynananlar.includes(o.id))
                .map(o => o.isim);

            const container = document.getElementById('oynananListesi');
            if (isimler.length === 0) {
                container.innerHTML = '<span style="color:#888;">Henüz oyun oynamadın.</span>';
            } else {
                container.innerHTML = isimler.map(isim => `<span>${isim}</span>`).join('');
            }
        }

        async function filtrele(tur) {
            const sonucDiv = document.getElementById('sonuc');

            if (tumOyunlar.length === 0) {
                await oyunlariYenile();
                if (tumOyunlar.length === 0) return;
            }

            sonucDiv.innerHTML = '<p class="yukleniyor">🔄 Filtreleniyor...</p>';

            const oynananlar = await oynananlariGetir();

            let filtrelenmis;
            if (tur === 'Tüm Türler') {
                filtrelenmis = tumOyunlar.filter(o => !oynananlar.includes(o.id));
            } else {
                filtrelenmis = tumOyunlar.filter(o =>
                    o.tur_slug.includes(tur) && !oynananlar.includes(o.id)
                );
            }

            if (filtrelenmis.length === 0) {
                sonucDiv.innerHTML = `<p class="basari-mesaji">🎉 Bu türde oynanmamış oyun kalmadı!</p>`;
                return;
            }

            let html = '';
            filtrelenmis.slice(0, 6).forEach(o => {
                const resimHtml = o.resim_url ?
                    `<img src="${o.resim_url}" alt="${o.isim}" style="width:150px;height:90px;object-fit:cover;border-radius:8px;background:#2d2d4a;" />` :
                    '';
                html += `
                        <div class="oyun-karti" style="gap:12px;">
                            ${resimHtml}
                            <div class="oyun-bilgi">
                                <h3 style="font-size:18px;">${o.isim}</h3>
                                <div class="oyun-detaylari">
                                    <span class="detay-etiketi">📅 ${o.cikis_yili}</span>
                                    <span class="detay-etiketi">⭐ ${o.puan}</span>
                                    <span class="detay-etiketi">${o.gelistirici}</span>
                                </div>
                                <span class="tur-etiketi">${o.tur}</span>
                                <div>
                                    <button class="oynadim-btn" onclick="oynadimEkle(${o.id})">✅ Oynadım</button>
                                </div>
                            </div>
                        </div>
                    `;
            });
            sonucDiv.innerHTML = html;
        }

        // ============================================================
        // 7️⃣ SAYFA YÜKLENİNCE
        // ============================================================
        window.onload = function() {
            console.log('🚀 Sayfa yüklendi!');
            document.getElementById('rastgeleBtn').addEventListener('click', rastgeleOner);
            document.getElementById('yenileBtn').addEventListener('click', oyunlariYenile);

            document.querySelectorAll('.filtre-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    filtrele(this.dataset.tur);
                });
            });

            // Sayfa açılır açılmaz oyunları yükle
            oyunlariYenile();
            oynananListesiniGuncelle();
        };

        // ============================================================
        // 8️⃣ GLOBAL
        // ============================================================
        window.rastgeleOner = rastgeleOner;
        window.filtrele = filtrele;
        window.oynadimEkle = oynadimEkle;
        window.oyunlariYenile = oyunlariYenile;
    </script>

</body>
</html>
