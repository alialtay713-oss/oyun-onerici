<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎮 Oyun Önerici</title>
    <!-- Supabase CDN'i güncel ve doğru sürüm -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: #0f0f1a;
            color: #eee;
        }
        .container {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }
        h1 {
            margin-bottom: 20px;
        }
        button {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 6px 4px;
            transition: 0.2s;
        }
        button:hover {
            background: #5a4bd1;
            transform: scale(1.02);
        }
        .filtre-btn {
            background: #2d2d4a;
            padding: 8px 18px;
            font-size: 14px;
        }
        .filtre-btn:hover {
            background: #3d3d5c;
        }
        .oyun-karti {
            background: #252541;
            padding: 20px;
            border-radius: 12px;
            margin: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .oyun-bilgi h3 {
            margin: 0;
            color: #fff;
        }
        .oyun-bilgi p {
            margin: 6px 0 0;
            color: #aaa;
        }
        .tur-etiketi {
            background: #3d3d5c;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 14px;
            color: #c7c7e6;
            display: inline-block;
            margin-top: 6px;
        }
        .oynadim-btn {
            background: #00b894;
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .oynadim-btn:hover {
            background: #00a381;
        }
        #sonuc {
            min-height: 100px;
            margin-top: 20px;
        }
        #sonuc p {
            color: #888;
        }
        #oynananlar {
            margin-top: 30px;
            border-top: 1px solid #2d2d4a;
            padding-top: 20px;
        }
        #oynananlar h3 {
            margin-bottom: 12px;
        }
        #oynananListesi span {
            background: #2d2d4a;
            padding: 4px 16px;
            border-radius: 16px;
            margin: 4px;
            display: inline-block;
            font-size: 14px;
        }
        .filtreler {
            margin: 16px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
        }
        .filtreler span {
            margin-right: 8px;
            font-weight: bold;
        }
        .hata-mesaji {
            color: #ff6b6b;
        }
        .basari-mesaji {
            color: #00b894;
        }
        .yukleniyor {
            color: #fdcb6e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 Oyun Önerici</h1>

        <div>
            <button id="rastgeleBtn">🎲 Bana Oyun Öner</button>
        </div>

        <div class="filtreler">
            <span>Tür:</span>
            <button class="filtre-btn" data-tur="Tüm Türler">Tümü</button>
            <button class="filtre-btn" data-tur="Aksiyon">Aksiyon</button>
            <button class="filtre-btn" data-tur="Macera">Macera</button>
            <button class="filtre-btn" data-tur="RPG">RPG</button>
            <button class="filtre-btn" data-tur="Strateji">Strateji</button>
            <button class="filtre-btn" data-tur="Simülasyon">Simülasyon</button>
            <button class="filtre-btn" data-tur="Platform">Platform</button>
            <button class="filtre-btn" data-tur="Bulmaca">Bulmaca</button>
            <button class="filtre-btn" data-tur="Sosyal">Sosyal</button>
        </div>

        <div id="sonuc">
            <p>Henüz öneri yok. Butona tıkla!</p>
        </div>

        <div id="oynananlar">
            <h3>✅ Oynadıklarım</h3>
            <div id="oynananListesi"><span style="color:#888;">Henüz oyun oynamadın.</span></div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1️⃣ SUPABASE BAĞLANTISI - KONTROLLÜ OLUŞTUR
        // ============================================================
        const SUPABASE_URL = "https://erlkkobrxrmdmcihzqjz.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_s4YSwBYzhJAU1GISeeqozQ_ZqZ5yWo4";

        // supabase nesnesinin doğru oluştuğunu kontrol et
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase bağlantısı başarılı!', supabase);
        } catch (error) {
            console.error('❌ Supabase bağlantı hatası:', error);
            alert('Supabase bağlanamadı! Lütfen sayfayı yenileyin.');
        }

        // ============================================================
        // 2️⃣ KULLANICI ID
        // ============================================================
        let kullaniciId = localStorage.getItem('kullaniciId');
        if (!kullaniciId) {
            kullaniciId = 'user_' + Math.random().toString(36).slice(2, 10);
            localStorage.setItem('kullaniciId', kullaniciId);
        }
        console.log('👤 Kullanıcı ID:', kullaniciId);

        // ============================================================
        // 3️⃣ VERİTABANI FONKSİYONLARI
        // ============================================================
        async function oyunlariGetir() {
            if (!supabase) {
                console.error('❌ Supabase bağlı değil!');
                return [];
            }
            try {
                const { data, error } = await supabase.from('oyunlar').select('*');
                if (error) {
                    console.error('❌ Veri çekme hatası:', error);
                    return [];
                }
                console.log('📦 Oyunlar yüklendi:', data?.length || 0, 'adet');
                return data || [];
            } catch (err) {
                console.error('❌ Beklenmeyen hata:', err);
                return [];
            }
        }

        async function oynananlariGetir() {
            if (!supabase) {
                console.error('❌ Supabase bağlı değil!');
                return [];
            }
            try {
                const { data, error } = await supabase
                    .from('oynananlar')
                    .select('oyun_id')
                    .eq('kullanici_id', kullaniciId);
                if (error) {
                    console.error('❌ Oynananlar hatası:', error);
                    return [];
                }
                return data.map(item => item.oyun_id);
            } catch (err) {
                console.error('❌ Beklenmeyen hata:', err);
                return [];
            }
        }

        // ============================================================
        // 4️⃣ ANA FONKSİYONLAR
        // ============================================================
        async function rastgeleOner() {
            const sonucDiv = document.getElementById('sonuc');
            sonucDiv.innerHTML = '<p class="yukleniyor">🔄 Oyun aranıyor...</p>';

            if (!supabase) {
                sonucDiv.innerHTML = '<p class="hata-mesaji">❌ Supabase bağlantısı yok!</p>';
                return;
            }

            const butunOyunlar = await oyunlariGetir();
            if (butunOyunlar.length === 0) {
                sonucDiv.innerHTML = '<p class="hata-mesaji">❌ Veritabanında oyun yok! Lütfen önce oyun ekleyin.</p>';
                return;
            }

            const oynananlar = await oynananlariGetir();
            const filtrelenmis = butunOyunlar.filter(o => !oynananlar.includes(o.id));

            if (filtrelenmis.length === 0) {
                sonucDiv.innerHTML = '<p class="basari-mesaji">🎉 Tüm oyunları oynadın! Yeni oyunlar eklemeyi dene.</p>';
                return;
            }

            const rastgele = filtrelenmis[Math.floor(Math.random() * filtrelenmis.length)];
            oyunGoster(rastgele);
        }

        function oyunGoster(oyun) {
            document.getElementById('sonuc').innerHTML = `
                    <div class="oyun-karti">
                        <div class="oyun-bilgi">
                            <h3>${oyun.isim}</h3>
                            <p>${oyun.aciklama || 'Açıklama yok'}</p>
                            <span class="tur-etiketi">${oyun.tur || 'Türsüz'}</span>
                        </div>
                        <div>
                            <button class="oynadim-btn" onclick="oynadimEkle(${oyun.id})">✅ Oynadım</button>
                        </div>
                    </div>
                `;
        }

        async function oynadimEkle(oyunId) {
            if (!supabase) {
                alert('❌ Supabase bağlantısı yok!');
                return;
            }

            const { error } = await supabase
                .from('oynananlar')
                .insert({ kullanici_id: kullaniciId, oyun_id: oyunId });

            if (error) {
                alert('❌ Hata: ' + error.message);
                console.error('❌ Ekleme hatası:', error);
                return;
            }

            document.getElementById('sonuc').innerHTML = '<p class="basari-mesaji">✅ Oyun listene eklendi! Başka bir oyun önereyim mi? 🎲</p>';
            oynananListesiniGuncelle();
        }

        async function oynananListesiniGuncelle() {
            const oynananlar = await oynananlariGetir();
            const butunOyunlar = await oyunlariGetir();
            const isimler = butunOyunlar
                .filter(o => oynananlar.includes(o.id))
                .map(o => o.isim);

            const container = document.getElementById('oynananListesi');
            if (isimler.length === 0) {
                container.innerHTML = '<span style="color:#888;">Henüz oyun oynamadın.</span>';
            } else {
                container.innerHTML = isimler.map(isim => `<span>${isim}</span>`).join('');
            }
        }

        async function filtrele(tur) {
            const sonucDiv = document.getElementById('sonuc');
            sonucDiv.innerHTML = '<p class="yukleniyor">🔄 Filtreleniyor...</p>';

            if (!supabase) {
                sonucDiv.innerHTML = '<p class="hata-mesaji">❌ Supabase bağlantısı yok!</p>';
                return;
            }

            const butunOyunlar = await oyunlariGetir();
            const oynananlar = await oynananlariGetir();

            let filtrelenmis;
            if (tur === 'Tüm Türler') {
                filtrelenmis = butunOyunlar.filter(o => !oynananlar.includes(o.id));
            } else {
                filtrelenmis = butunOyunlar.filter(o => o.tur === tur && !oynananlar.includes(o.id));
            }

            if (filtrelenmis.length === 0) {
                sonucDiv.innerHTML = `<p class="basari-mesaji">🎉 Bu türde oynanmamış oyun kalmadı!</p>`;
                return;
            }

            let html = '';
            filtrelenmis.slice(0, 8).forEach(o => {
                html += `
                        <div class="oyun-karti">
                            <div class="oyun-bilgi">
                                <h3>${o.isim}</h3>
                                <p>${o.aciklama || ''}</p>
                                <span class="tur-etiketi">${o.tur || 'Türsüz'}</span>
                            </div>
                            <div>
                                <button class="oynadim-btn" onclick="oynadimEkle(${o.id})">✅ Oynadım</button>
                            </div>
                        </div>
                    `;
            });
            sonucDiv.innerHTML = html;
        }

        // ============================================================
        // 5️⃣ SAYFA YÜKLENİNCE
        // ============================================================
        window.onload = function() {
            console.log('🚀 Sayfa yüklendi!');
            if (supabase) {
                oynananListesiniGuncelle();
            } else {
                document.getElementById('oynananListesi').innerHTML =
                    '<span style="color:#ff6b6b;">❌ Supabase bağlantısı kurulamadı!</span>';
            }

            document.getElementById('rastgeleBtn').addEventListener('click', rastgeleOner);

            document.querySelectorAll('.filtre-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    filtrele(this.dataset.tur);
                });
            });
        };

        // ============================================================
        // 6️⃣ GLOBAL (HTML'den çağrılmak için)
        // ============================================================
        window.rastgeleOner = rastgeleOner;
        window.filtrele = filtrele;
        window.oynadimEkle = oynadimEkle;
    </script>

</body>
</html>
